
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Talking Bat Analytics | PSL Comparison Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
:root{
  --bg:#070819;
  --panel:#0d1026;
  --panel2:#121737;
  --ink:#f5f7ff;
  --muted:#a8b1d4;
  --line:#232a57;
  --accent:#2d8cff;
  --good:#22c55e;
  --bad:#ef4444;
  --warn:#facc15;
  --orange:#f59e0b;
  --pink:#ff4fa3;
  --cyan:#00d4ff;
  --purple:#8b5cf6;
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:Arial, Helvetica, sans-serif;
  background:linear-gradient(180deg,#060713 0%, #090b1d 35%, #050611 100%);
  color:var(--ink);
}
.header{
  padding:18px 18px 8px 18px;
  background:linear-gradient(180deg,#0d1332 0%, #0a0d22 100%);
  border-bottom:1px solid var(--line);
  position:sticky;
  top:0;
  z-index:30;
}
.header .top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:12px;
  flex-wrap:wrap;
}
.brand{
  display:flex;
  align-items:center;
  gap:12px;
}
.brand-badge{
  width:34px;height:34px;border-radius:10px;background:#00c2ff;color:#001322;
  font-weight:900;display:flex;align-items:center;justify-content:center;
}
.brand-title{
  font-weight:800;
  letter-spacing:2px;
  font-size:15px;
  color:#dce7ff;
}
.toolbar{
  display:grid;
  grid-template-columns: 2fr 1.2fr 1.2fr 1fr 1fr;
  gap:10px;
  margin-top:10px;
}
@media (max-width: 1100px){ .toolbar{grid-template-columns:1fr 1fr;} }
@media (max-width: 700px){ .toolbar{grid-template-columns:1fr;} }

.input,.select,button{
  width:100%;
  background:#0c1128;
  color:#eaf1ff;
  border:1px solid var(--line);
  border-radius:12px;
  padding:12px 14px;
  font-size:13px;
}
button{
  background:linear-gradient(90deg,#2446ff,#6c3cff);
  border:none;
  font-weight:700;
  cursor:pointer;
}
button.secondary{
  background:#121737;
  border:1px solid var(--line);
}

.wrap{ padding:18px; }

.hero{
  background:linear-gradient(180deg,#111530 0%, #0a0e23 100%);
  border:1px solid var(--line);
  border-radius:22px;
  padding:18px;
  margin-bottom:16px;
}
.hero-top{
  display:grid;
  grid-template-columns: 1fr auto 1fr;
  gap:12px;
  align-items:center;
}
@media (max-width: 900px){ .hero-top{grid-template-columns:1fr;} }

.team-name{
  font-size:38px;
  font-weight:900;
  line-height:1;
}
.team-name.right{text-align:right}
.score-big{
  text-align:center;
}
.score-big .main{
  font-size:74px;
  font-weight:900;
  line-height:1;
}
.score-big .sub{
  margin-top:8px;
  color:var(--muted);
  font-size:14px;
  letter-spacing:2px;
}
.match-head{
  text-align:center;
  margin-bottom:14px;
}
.match-head .title{
  font-weight:800;
  font-size:22px;
}
.match-head .meta{
  margin-top:6px;
  color:var(--muted);
  font-size:13px;
}

.kpis{
  display:grid;
  grid-template-columns: repeat(8, minmax(100px,1fr));
  gap:10px;
  margin-top:16px;
}
@media (max-width: 1200px){ .kpis{grid-template-columns: repeat(4, minmax(100px,1fr));} }
@media (max-width: 700px){ .kpis{grid-template-columns: repeat(2, minmax(100px,1fr));} }

.kpi{
  background:#0a1027;
  border:1px solid var(--line);
  border-radius:16px;
  padding:12px;
  text-align:center;
}
.kpi .label{
  color:var(--muted);
  font-size:11px;
  text-transform:uppercase;
  letter-spacing:1px;
}
.kpi .value{
  font-size:26px;
  font-weight:900;
  margin-top:6px;
}
.kpi.good .value{ color:var(--good);}
.kpi.bad .value{ color:var(--bad);}
.kpi.warn .value{ color:var(--warn);}

.tabs{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  margin-bottom:14px;
}
.tab-btn{
  background:#0d132f;
  border:1px solid var(--line);
  color:#dfe7ff;
  border-radius:999px;
  padding:10px 14px;
  cursor:pointer;
  font-weight:700;
}
.tab-btn.active{
  background:linear-gradient(90deg,#2132ff,#7f3cff);
  border:none;
}
.tab{
  display:none;
}
.tab.active{
  display:block;
}

.grid-2{
  display:grid;
  grid-template-columns: 1.2fr 1fr;
  gap:16px;
}
.grid-3{
  display:grid;
  grid-template-columns: repeat(3,1fr);
  gap:16px;
}
.grid-4{
  display:grid;
  grid-template-columns: repeat(4,1fr);
  gap:16px;
}
@media (max-width: 1100px){
  .grid-2,.grid-3,.grid-4{grid-template-columns:1fr;}
}

.card{
  background:linear-gradient(180deg,#0d1129 0%, #090d20 100%);
  border:1px solid var(--line);
  border-radius:22px;
  padding:16px;
  margin-bottom:16px;
}
.card h3{
  margin:0 0 10px 0;
  font-size:18px;
}
.card h4{
  margin:0 0 10px 0;
  font-size:15px;
  color:#dfe7ff;
}
.small-note{
  color:var(--muted);
  font-size:12px;
  margin-bottom:10px;
}

.table-wrap{
  overflow:auto;
  width:100%;
}
table{
  width:100%;
  border-collapse:collapse;
  font-size:12px;
}
th{
  background:#10204e;
  color:white;
  padding:10px 8px;
  border:1px solid #24346f;
  white-space:nowrap;
}
td{
  padding:9px 8px;
  border:1px solid #1f2854;
  text-align:center;
  white-space:nowrap;
}
tbody tr:nth-child(even) td{ background:#0a1026; }
tbody tr:nth-child(odd) td{ background:#0b0f21; }

.heat-good{ background:rgba(34,197,94,0.18) !important; color:#b7ffd0; font-weight:700; }
.heat-bad{ background:rgba(239,68,68,0.18) !important; color:#ffc1c1; font-weight:700; }
.heat-warn{ background:rgba(250,204,21,0.15) !important; color:#fff2a6; font-weight:700; }

.section-title{
  font-size:21px;
  font-weight:900;
  margin-bottom:8px;
}
.section-sub{
  color:var(--muted);
  font-size:12px;
  margin-bottom:14px;
}

.compare-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:14px;
}
@media (max-width:900px){ .compare-grid{grid-template-columns:1fr;} }

.team-box{
  background:#0b1128;
  border:1px solid var(--line);
  border-radius:18px;
  padding:14px;
}
.team-box h4{
  margin:0 0 12px 0;
  font-size:17px;
}

.phase-cards{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:14px;
}
@media (max-width:1100px){ .phase-cards{grid-template-columns:1fr;} }
.phase-card{
  background:#0b1024;
  border:1px solid var(--line);
  border-radius:18px;
  padding:14px;
}
.phase-title{
  font-size:16px;
  font-weight:800;
  margin-bottom:10px;
}
.metric-row{
  display:grid;
  grid-template-columns:1fr auto 1fr;
  gap:8px;
  align-items:center;
  margin-bottom:8px;
}
.metric-row .mid{
  color:var(--muted);
  font-size:11px;
  text-transform:uppercase;
}
.bar{
  height:12px;
  border-radius:999px;
  background:#11183d;
  overflow:hidden;
  border:1px solid #202a58;
}
.bar-fill{
  height:100%;
  background:linear-gradient(90deg,#22c55e,#2d8cff);
}
.bar-fill.red{
  background:linear-gradient(90deg,#ef4444,#ff7b7b);
}

.insight{
  border-radius:16px;
  padding:12px 14px;
  margin-bottom:10px;
  font-size:14px;
  border-left:6px solid;
}
.insight.good{
  background:rgba(34,197,94,0.12);
  border-color:var(--good);
}
.insight.bad{
  background:rgba(239,68,68,0.10);
  border-color:var(--bad);
}
.insight.warn{
  background:rgba(250,204,21,0.10);
  border-color:var(--warn);
}

.pitchmap{
  display:grid;
  grid-template-columns:repeat(6,1fr);
  gap:6px;
}
.pitch-cell{
  min-height:72px;
  border-radius:12px;
  border:1px solid #24315f;
  padding:6px;
  font-size:11px;
  background:#0b1025;
}
.pitch-cell .ttl{
  color:#9fb3ff;
  font-weight:800;
  font-size:10px;
  margin-bottom:4px;
}
.pitch-legend{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:8px;
  margin-top:10px;
  color:var(--muted);
  font-size:11px;
}
@media (max-width:900px){ .pitchmap{grid-template-columns:repeat(3,1fr);} }

.wagon-wrap{
  display:flex;
  gap:16px;
  align-items:center;
  flex-wrap:wrap;
}
.wagon-svg{
  width:340px;
  height:340px;
  max-width:100%;
  background:#0b1024;
  border:1px solid var(--line);
  border-radius:18px;
}
.player-grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:16px;
}
@media (max-width:1100px){ .player-grid{grid-template-columns:1fr;} }

.player-card{
  background:linear-gradient(180deg,#121632 0%, #0a0e23 100%);
  border:1px solid var(--line);
  border-radius:24px;
  padding:16px;
}
.player-head{
  display:grid;
  grid-template-columns:auto 1fr auto;
  gap:12px;
  align-items:center;
}
.avatar{
  width:62px;height:62px;border-radius:18px;
  background:linear-gradient(135deg,#1dd3ff,#334bff);
  display:flex;align-items:center;justify-content:center;
  font-weight:900;font-size:24px;color:#021127;
}
.player-name{
  font-size:22px;
  font-weight:900;
}
.player-sub{
  color:var(--muted);
  font-size:13px;
  margin-top:4px;
}
.player-kpis{
  display:grid;
  grid-template-columns:repeat(6, minmax(76px,1fr));
  gap:8px;
  margin-top:14px;
}
@media (max-width:900px){ .player-kpis{grid-template-columns:repeat(3, minmax(76px,1fr));} }

.player-kpi{
  background:#091027;
  border:1px solid var(--line);
  border-radius:14px;
  padding:8px;
  text-align:center;
}
.player-kpi .l{
  font-size:10px;color:var(--muted);font-weight:700;text-transform:uppercase;
}
.player-kpi .v{
  font-size:16px;font-weight:900;margin-top:4px;
}

.spark{
  width:100%;
  height:140px;
  background:#0b1024;
  border:1px solid var(--line);
  border-radius:16px;
}

.footer{
  text-align:center;
  color:#7883b8;
  font-size:11px;
  letter-spacing:3px;
  padding:24px 12px 36px 12px;
}

.badge{
  display:inline-block;
  padding:6px 10px;
  border-radius:999px;
  font-size:11px;
  font-weight:800;
  background:#1a2147;
  color:#cfe3ff;
  margin-right:6px;
}

/* ── LANDSCAPE PLAYER CARD MODAL ── */
.pc-overlay{
  position:fixed; inset:0;
  background:rgba(4,8,28,0.92);
  z-index:9000;
  display:none;
  align-items:flex-start;
  justify-content:center;
  overflow-y:auto;
  padding:20px 10px 40px;
}
.pc-overlay.open{ display:flex; }
.pc-wrap{
  width:100%; max-width:1480px;
  background:#fff;
  border-radius:22px;
  overflow:hidden;
  box-shadow:0 32px 80px rgba(0,0,0,0.6);
  font-family:Arial, Helvetica, sans-serif;
  color:#0f172a;
}
/* Card header */
.pc-head{
  background:linear-gradient(135deg,#0b2e68,#103b82);
  color:#fff;
  padding:18px 24px;
  display:grid;
  grid-template-columns:1.6fr 1fr;
  gap:16px;
  align-items:center;
}
.pc-title h2{ margin:0; font-size:34px; line-height:1.05; }
.pc-title .pc-sub{ margin-top:8px; color:#dbeafe; font-size:14px; font-weight:700; letter-spacing:.06em; text-transform:uppercase; }
.pc-meta-boxes{ display:grid; grid-template-columns:repeat(3,1fr); gap:10px; }
.pc-meta-box{
  background:rgba(255,255,255,.12);
  border:1px solid rgba(255,255,255,.18);
  border-radius:14px;
  padding:10px 12px;
  text-align:center;
}
.pc-meta-box .k{ font-size:11px; color:#dbeafe; font-weight:700; text-transform:uppercase; letter-spacing:.08em; }
.pc-meta-box .v{ font-size:18px; font-weight:800; margin-top:4px; }
/* Card body */
.pc-body{
  padding:16px;
  display:grid;
  grid-template-columns:0.95fr 1.15fr 1.1fr;
  gap:14px;
}
.pc-col{ display:grid; gap:14px; align-content:start; }
.pc-block{
  border:1px solid #d7e2f0;
  background:#fff;
  border-radius:18px;
  overflow:hidden;
}
.pc-block h3{
  margin:0; padding:12px 14px;
  background:#f6f9ff;
  border-bottom:1px solid #d7e2f0;
  color:#0b2e68;
  font-size:13px;
  text-transform:uppercase;
  letter-spacing:.12em;
}
.pc-block .inner{ padding:12px 14px; }
.pc-stat-grid{ display:grid; grid-template-columns:repeat(4,1fr); gap:10px; }
.pc-stat{
  background:#eef4ff; border:1px solid #d7e2f0;
  border-radius:14px; padding:12px; text-align:center;
}
.pc-stat .s1{ font-size:11px; color:#475569; text-transform:uppercase; font-weight:800; letter-spacing:.08em; }
.pc-stat .s2{ font-size:24px; color:#0b2e68; font-weight:900; margin-top:6px; }
.pc-kpis{ display:grid; grid-template-columns:repeat(4,1fr); gap:8px; }
.pc-mini{ text-align:center; padding:8px; background:#f6f9ff; border-radius:12px; border:1px solid #d7e2f0; }
.pc-mini .k{ font-size:10px; color:#475569; text-transform:uppercase; font-weight:700; }
.pc-mini .v{ font-size:18px; color:#0b2e68; font-weight:900; margin-top:4px; }
.pc-strength{
  border:1px solid #d7e2f0; border-radius:14px;
  padding:12px; background:#fff; margin-bottom:10px;
}
.pc-strength:last-child{ margin-bottom:0; }
.pc-shot-name{ font-size:15px; font-weight:900; color:#0b2e68; }
.pc-tag{
  background:#e8f1ff; color:#1d4ed8;
  border-radius:999px; padding:4px 10px;
  font-size:11px; font-weight:800;
  text-transform:uppercase; letter-spacing:.08em;
}
.pc-evidence{ font-size:12px; color:#475569; font-weight:700; line-height:1.5; margin-top:6px; }
.pc-table{ width:100%; border-collapse:collapse; }
.pc-table th{ background:#103b82; color:#fff; padding:9px 8px; text-align:center; font-size:11px; text-transform:uppercase; letter-spacing:.08em; }
.pc-table td{ border:1px solid #d7e2f0; padding:8px; text-align:center; font-size:12px; }
.pc-table td:first-child{ font-weight:800; color:#0b2e68; }
.pc-img-grid{ display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.pc-img-card{
  border:1px dashed #aac2ea;
  border-radius:14px;
  background:#f8fbff;
  min-height:160px;
  display:flex; align-items:center; justify-content:center;
  text-align:center;
  color:#5b6b85; font-size:12px; font-weight:800;
  padding:10px;
  position:relative;
}
.pc-img-label{
  position:absolute; top:8px; left:8px;
  background:rgba(16,59,130,.88); color:#fff;
  padding:4px 8px; border-radius:999px;
  font-size:10px; font-weight:800;
  text-transform:uppercase; letter-spacing:.06em;
}
.pc-notes{
  font-size:12px; color:#475569; line-height:1.6;
  font-style:italic;
}
.pc-footer{
  display:flex; align-items:center; justify-content:space-between;
  padding:10px 16px;
  border-top:1px solid #d7e2f0;
  background:#f8fbff;
  font-size:11px; font-weight:800; color:#475569;
}
.pc-close-btn{
  position:sticky; top:16px;
  float:right; margin:10px 10px 0 0;
  background:#ef4444; color:#fff;
  border:none; border-radius:10px;
  padding:9px 16px; font-weight:800; cursor:pointer;
  font-size:13px; z-index:2;
  box-shadow:0 4px 12px rgba(239,68,68,0.4);
}
.pc-close-btn:hover{ background:#dc2626; }
.pc-mode-btn{
  background:#0c1128; border:1px solid var(--line);
  color:#eaf1ff; border-radius:999px;
  padding:8px 16px; font-size:12px;
  font-weight:700; cursor:pointer; margin:0 4px;
}
.pc-mode-btn.active{
  background:linear-gradient(90deg,#2132ff,#7f3cff);
  border:none;
}
.pc-ctrl-bar{
  background:#0a0d1f; border-bottom:1px solid var(--line);
  padding:14px 20px;
  display:flex; align-items:center; gap:14px; flex-wrap:wrap;
}
.pc-ctrl-bar label{ color:#a8b1d4; font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:.1em; }
.pc-ctrl-bar select{
  background:#0c1128; color:#eaf1ff;
  border:1px solid var(--line); border-radius:10px;
  padding:9px 12px; font-size:13px;
}

/* Override wrapper for modal */
.pc-wrap .pc-body table th{ background:#103b82; }
.pc-ulist{ margin:0; padding-left:18px; }
.pc-ulist li{ margin:7px 0; font-size:13px; font-weight:700; color:#0f172a; }
.btn-card-view{
  background:linear-gradient(90deg,#103b82,#1d4ed8);
  border:none; color:#fff; border-radius:8px;
  padding:5px 11px; font-size:11px; font-weight:700;
  cursor:pointer; margin-left:6px;
}
.btn-card-view:hover{ opacity:.85; }
</style>
</head>
<body>
<div class="header">
  <div class="top">
    <div class="brand">
      <div class="brand-badge">TB</div>
      <div>
        <div class="brand-title">Talking Bat Analytics</div>
        <div style="color:var(--muted);font-size:11px;letter-spacing:2px;">BROADCAST INTELLIGENCE MODE</div>
      </div>
    </div>
    <div>
      <span class="badge">PSL-STYLE</span>
      <span class="badge">COMPARISON MODE</span>
      <span class="badge">ALL PLAYER CARDS</span>
    </div>
  </div>

  <div class="toolbar">
    <select class="select" id="matchSelect"></select>
    <select class="select" id="tournamentSelect"></select>
    <select class="select" id="teamSelect"></select>
    <input class="input" id="searchInput" placeholder="Search team / venue / date">
    <div style="display:flex;gap:10px;">
      <button onclick="renderSelected()">Load Dashboard</button>
      <button class="secondary" onclick="window.print()">Print / PDF</button>
    </div>
  </div>
</div>

<div class="wrap">
  <div id="hero"></div>

  <div class="tabs">
    <button class="tab-btn active" onclick="openTab('overview', this)">Match Summary</button>
    <button class="tab-btn" onclick="openTab('teamcomp', this)">Team Comparison</button>
    <button class="tab-btn" onclick="openTab('batting', this)">Batting Comparison</button>
    <button class="tab-btn" onclick="openTab('bowling', this)">Bowling Comparison</button>
    <button class="tab-btn" onclick="openTab('phase', this)">Phase Comparison</button>
    <button class="tab-btn" onclick="openTab('pacespin', this)">Pace vs Spin</button>
    <button class="tab-btn" onclick="openTab('matchups', this)">Action Matchups</button>
    <button class="tab-btn" onclick="openTab('pitchmap', this)">Pitch Maps</button>
    <button class="tab-btn" onclick="openTab('wagon', this)">Wagon Wheels</button>
    <button class="tab-btn" onclick="openTab('scorecards', this)">Scorecards</button>
    <button class="tab-btn" onclick="openTab('players1', this)">Players Team 1</button>
    <button class="tab-btn" onclick="openTab('players2', this)">Players Team 2</button>
    <button class="tab-btn" onclick="openTab('notes', this)">Analyst Notes</button>
    <button class="tab-btn" onclick="openTab('playercardtab', this)">&#9654; Player Scorecard</button>
  </div>

  <div id="overview" class="tab active"></div>
  <div id="teamcomp" class="tab"></div>
  <div id="batting" class="tab"></div>
  <div id="bowling" class="tab"></div>
  <div id="phase" class="tab"></div>
  <div id="pacespin" class="tab"></div>
  <div id="matchups" class="tab"></div>
  <div id="pitchmap" class="tab"></div>
  <div id="wagon" class="tab"></div>
  <div id="scorecards" class="tab"></div>
  <div id="players1" class="tab"></div>
  <div id="players2" class="tab"></div>
  <div id="notes" class="tab"></div>
  <div id="playercardtab" class="tab"></div>
</div>

<!-- LANDSCAPE PLAYER CARD MODAL -->
<div class="pc-overlay" id="pcOverlay">
  <div style="width:100%;max-width:1480px;">
    <button class="pc-close-btn" onclick="closePcModal()">&#10005; Close Card</button>
    <div class="pc-wrap" id="pcWrap"></div>
  </div>
</div>

function esc(s){
  if (s === null || s === undefined) return "";
  return String(s).replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;");
}
function uniq(arr){ return [...new Set(arr)]; }
function fmt(x){
  if (x === null || x === undefined || x === "") return "-";
  if (typeof x === "number") {
    if (Number.isInteger(x)) return String(x);
    return x.toFixed(2).replace(/\.00$/,'');
  }
  return String(x);
}
function openTab(id, btn){
  document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));
  document.querySelectorAll(".tab-btn").forEach(x=>x.classList.remove("active"));
  document.getElementById(id).classList.add("active");
  btn.classList.add("active");
}
function fillFilters(){
  const matchSel = document.getElementById("matchSelect");
  const tourSel = document.getElementById("tournamentSelect");
  const teamSel = document.getElementById("teamSelect");

  const tours = uniq(MATCH_INDEX.map(x=>x.Tournament).filter(Boolean)).sort();
  const teams = uniq(MATCH_INDEX.flatMap(x=>[x.team1,x.team2]).filter(Boolean)).sort();

  tourSel.innerHTML = `<option value="">All Tournaments</option>` + tours.map(x=>`<option value="${esc(x)}">${esc(x)}</option>`).join("");
  teamSel.innerHTML = `<option value="">All Teams</option>` + teams.map(x=>`<option value="${esc(x)}">${esc(x)}</option>`).join("");

  function refreshMatches(){
    const tq = tourSel.value;
    const tm = teamSel.value;
    const sq = document.getElementById("searchInput").value.toLowerCase().trim();

    const filtered = MATCH_INDEX.filter(m=>{
      const okT = !tq || m.Tournament === tq;
      const okM = !tm || [m.team1,m.team2,m.teams].join(" ").includes(tm);
      const hay = [m.label,m.Venue,m.Date,m.score_line].join(" ").toLowerCase();
      const okS = !sq || hay.includes(sq);
      return okT && okM && okS;
    });

    matchSel.innerHTML = filtered.map(m=>`<option value="${m.match_id}">${esc(m.label)}</option>`).join("");
  }
  tourSel.addEventListener("change", refreshMatches);
  teamSel.addEventListener("change", refreshMatches);
  document.getElementById("searchInput").addEventListener("input", refreshMatches);
  refreshMatches();
}

function table(headers, rows, heatRules=null){
  if(!rows || !rows.length) return `<div class="small-note">No data available.</div>`;
  let body = rows.map(r=>{
    return `<tr>` + r.map((c, idx)=>{
      let cls = "";
      if (heatRules && heatRules[idx]) cls = heatClass(c, heatRules[idx]);
      return `<td class="${cls}">${esc(fmt(c))}</td>`;
    }).join("") + `</tr>`;
  }).join("");
  return `<div class="table-wrap"><table><thead><tr>${headers.map(h=>`<th>${esc(h)}</th>`).join("")}</tr></thead><tbody>${body}</tbody></table></div>`;
}
function heatClass(val, rule){
  const n = Number(val);
  if (isNaN(n)) return "";
  if (rule.type === "higher") {
    if (n >= rule.good) return "heat-good";
    if (n <= rule.bad) return "heat-bad";
    return "heat-warn";
  }
  if (rule.type === "lower") {
    if (n <= rule.good) return "heat-good";
    if (n >= rule.bad) return "heat-bad";
    return "heat-warn";
  }
  return "";
}
function metricRow(a, label, b, inverse=false){
  const av = Number(a)||0;
  const bv = Number(b)||0;
  const total = Math.max(av + bv, 1);
  const ap = (av/total)*100;
  const bp = (bv/total)*100;
  const aBarCls = inverse ? (av<=bv ? "" : "red") : (av>=bv ? "" : "red");
  const bBarCls = inverse ? (bv<=av ? "" : "red") : (bv>=av ? "" : "red");
  return `
    <div class="metric-row">
      <div>
        <div style="font-weight:800">${fmt(a)}</div>
        <div class="bar"><div class="bar-fill ${aBarCls}" style="width:${ap}%"></div></div>
      </div>
      <div class="mid">${esc(label)}</div>
      <div>
        <div style="font-weight:800;text-align:right">${fmt(b)}</div>
        <div class="bar"><div class="bar-fill ${bBarCls}" style="width:${bp}%"></div></div>
      </div>
    </div>
  `;

function wagonSvg(zones){
  const order = ["Fine Leg","Square Leg","Midwicket","Mid On","Mid Off","Covers","Point","Third Man"];
  const colors = ["#163a9e","#2756d6","#336de6","#5a86ef","#7a9ff5","#4f82ed","#6f95ee","#94b5ff"];
  const cx = 170, cy = 170, r = 130;
  let out = `<svg viewBox="0 0 340 340" class="wagon-svg">`;
  out += `<circle cx="${cx}" cy="${cy}" r="80" fill="none" stroke="#cdd6ff66" stroke-width="2"/>`;
  out += `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#cdd6ff66" stroke-width="2"/>`;
  for(let i=0;i<8;i++){
    const a0 = (-90 + i*45) * Math.PI/180;
    const a1 = (-90 + (i+1)*45) * Math.PI/180;
    const x1 = cx + r*Math.cos(a0), y1 = cy + r*Math.sin(a0);
    const x2 = cx + r*Math.cos(a1), y2 = cy + r*Math.sin(a1);
    const large = 0;
    out += `<path d="M ${cx} ${cy} L ${x1} ${y1} A ${r} ${r} 0 ${large} 1 ${x2} ${y2} Z" fill="${colors[i]}" opacity="0.9" stroke="#dfe8ff66"/>`;
  }
  for(let i=0;i<8;i++){
    const mid = (-90 + i*45 + 22.5) * Math.PI/180;
    const tx = cx + 100*Math.cos(mid), ty = cy + 100*Math.sin(mid);
    const zoneName = order[i];
    const found = zones.find(z=>z.zone===zoneName) || {pct:0};
    out += `<text x="${tx}" y="${ty}" text-anchor="middle" fill="white" font-size="16" font-weight="800">${fmt(found.pct || 0)}%</text>`;
  }
  out += `<rect x="156" y="120" width="28" height="50" rx="4" fill="#f6f2d5" stroke="#ffffff99"/>`;
  out += `</svg>`;
  return out;
}

function sparkSVG(points, key, color="#2d8cff", yLabel=""){
  if(!points || !points.length){
    return `<svg viewBox="0 0 420 140" class="spark"></svg>`;
  }
  const w=420, h=140, pad=20;
  const vals = points.map(p=>Number(p[key])||0);
  const maxV = Math.max(...vals, 1);
  const minV = Math.min(...vals, 0);
  const range = Math.max(maxV - minV, 1);

  let d = "";
  points.forEach((p, i)=>{
    const x = pad + (i * ((w-pad*2)/(Math.max(points.length-1,1))));
    const y = h - pad - (((Number(p[key])||0)-minV)/range)*(h-pad*2);
    d += (i===0 ? `M ${x} ${y}` : ` L ${x} ${y}`);
  });

  let svg = `<svg viewBox="0 0 ${w} ${h}" class="spark">`;
  for(let i=0;i<4;i++){
    const gy = pad + i*((h-pad*2)/3);
    svg += `<line x1="${pad}" y1="${gy}" x2="${w-pad}" y2="${gy}" stroke="#33406f" stroke-width="1"/>`;
  }
  svg += `<path d="${d}" fill="none" stroke="${color}" stroke-width="3"/>`;
  svg += `</svg>`;
  return svg;
}

function renderPlayers(packet){
  const meta = packet.meta || {};
  const t1 = meta.team1 || (packet.compare.teamA||{}).team || "Team 1";
  const t2 = meta.team2 || (packet.compare.teamB||{}).team || "Team 2";
  const p = packet.players || {batters:{}, bowlers:{}};

  document.getElementById("players1").innerHTML = playerSection(
    t1 + " Player Cards",
    p.batters[t1] || [],
    p.bowlers[t1] || []
  );
  document.getElementById("players2").innerHTML = playerSection(
    t2 + " Player Cards",
    p.batters[t2] || [],
    p.bowlers[t2] || []
  );
}
function renderNotes(packet){
  const ins = packet.insights || [];
  document.getElementById("notes").innerHTML = `
    <div class="card">
      <div class="section-title">Coach & Analyst Notes</div>
      <div class="section-sub">Use this page for tactical debrief and next match planning.</div>
      ${ins.map(x=>`<div class="insight ${esc(x.type || 'warn')}">${esc(x.text)}</div>`).join("")}
      <div class="insight warn">Review team comparison first, then phase comparison, then player cards to separate tactical issue from execution issue.</div>
      <div class="insight warn">Strike Rotation % is calculated as (1s + 2s + 3s) / Balls × 100.</div>
      <div class="insight warn">Pitch map is shown as categorical line-length buckets instead of raw coordinate strings.</div>
    </div>
  `;
}
function renderSelected(){
  const packet = getPacket();
  if (!packet || packet.error){
    alert(packet && packet.error ? packet.error : "No packet found.");
    return;
  }
  renderHero(packet);
  renderOverview(packet);
  renderTeamComparison(packet);
  renderBatting(packet);
  renderBowling(packet);
  renderPhase(packet);
  renderPaceSpin(packet);
  renderMatchups(packet);
  renderPitchMap(packet);
  renderWagon(packet);
  renderScorecards(packet);
  renderPlayers(packet);
  renderNotes(packet);
}

/* ─────────────────────────────────────
   CSV UTILITY FUNCTIONS
───────────────────────────────────── */
function csvBalls(rows){ return rows.filter(r=>r.blt!=="Wide"); }
function csvRuns(rows){ return rows.reduce((s,r)=>s+(parseInt(r.br)||0),0); }
function csvWkts(rows){ return rows.filter(r=>r.dk && r.dk!=="").length; }
function csvSR(r,b){ return b>0 ? +((r/b)*100).toFixed(1) : 0; }
function csvAvg(r,w){ return w>0 ? +(r/w).toFixed(1) : r; }
function csvEco(r,b){ return b>0 ? +((r/b)*6).toFixed(2) : 0; }
function csvDots(rows){ return rows.filter(r=>r.blt==="Runs" && (parseInt(r.br)||0)===0).length; }
function csvDotPct(rows){
  const b=csvBalls(rows).length;
  return b>0 ? +((csvDots(rows)/b)*100).toFixed(1):0;
}
function getPhase(ov){ if(ov<=5)return "Powerplay"; if(ov<=14)return "Middle"; return "Death"; }

/* ─────────────────────────────────────
   BATSMAN STATS COMPUTATION
───────────────────────────────────── */
function computeBatterStats(batName, modeFilter){
  let all = CSV_DATA.filter(r=>r.bat.trim()===batName.trim());
  let rows = (modeFilter && modeFilter!=="ALL") ? all.filter(r=>r.bt===modeFilter) : all;
  if(!rows.length) return null;

  const balls = csvBalls(rows);
  const runs  = csvRuns(rows);
  const bCount= balls.length;
  const fours = rows.filter(r=>parseInt(r.br)===4).length;
  const sixes = rows.filter(r=>parseInt(r.br)===6).length;
  const dots  = csvDots(rows);
  const wkts  = csvWkts(all);
  const team  = rows[0].btt;
  const style = rows[0].bs;

  const dismissRow = all.find(r=>r.pd && r.pd.trim()===batName.trim());
  const dismissal  = dismissRow ? dismissRow.dk : "not out";

  // Phase breakdown
  const phases = ["Powerplay","Middle","Death"];
  const phaseRows = phases.map(ph=>{
    const pr = rows.filter(r=>getPhase(parseInt(r.ov))===ph);
    const pb = csvBalls(pr).length;
    const prun= csvRuns(pr);
    return {
      phase:ph, runs:prun, balls:pb,
      fours:pr.filter(r=>parseInt(r.br)===4).length,
      sixes:pr.filter(r=>parseInt(r.br)===6).length,
      dots:csvDots(pr), sr:csvSR(prun,pb), dot_pct:csvDotPct(pr)
    };
  });

  // Pace vs Spin
  const psRows = ["PACE","SPIN"].map(tp=>{
    const tr = rows.filter(r=>r.bt===tp);
    const tb = csvBalls(tr).length;
    const trun= csvRuns(tr);
    return {
      type:tp, runs:trun, balls:tb,
      fours:tr.filter(r=>parseInt(r.br)===4).length,
      sixes:tr.filter(r=>parseInt(r.br)===6).length,
      dots:csvDots(tr), sr:csvSR(trun,tb), wkts:csvWkts(tr)
    };
  });

  // Matchups by bowling action
  const actionMap = {};
  rows.forEach(r=>{
    if(!actionMap[r.ba]) actionMap[r.ba]={action:r.ba,runs:0,balls:0,wkts:0};
    const a=actionMap[r.ba];
    a.runs+=parseInt(r.br)||0;
    if(r.blt!=="Wide") a.balls++;
    if(r.dk && r.dk!=="") a.wkts++;
  });
  const actionRows = Object.values(actionMap)
    .sort((a,b)=>b.runs-a.runs)
    .map(a=>({...a, sr:csvSR(a.runs,a.balls)}));

  // Strength shots (top 2 by runs)
  const shotMap = {};
  rows.forEach(r=>{
    if(!shotMap[r.sn]) shotMap[r.sn]={shot:r.sn,runs:0,balls:0,fours:0,sixes:0};
    const s=shotMap[r.sn];
    s.runs+=parseInt(r.br)||0;
    if(r.blt!=="Wide") s.balls++;
    if(parseInt(r.br)===4) s.fours++;
    if(parseInt(r.br)===6) s.sixes++;
  });
  const shots = Object.values(shotMap).filter(s=>s.balls>0).sort((a,b)=>b.runs-a.runs);
  const top2  = shots.slice(0,2).map(s=>({
    shot:s.shot,
    evidence:`${s.runs} runs off ${s.balls} balls (SR ${csvSR(s.runs,s.balls)}) \u2022 ${s.fours} fours, ${s.sixes} sixes`
  }));
  const top3unorthodox = shots.slice(2,5).map(s=>({
    shot:s.shot, runs:s.runs, balls:s.balls, sr:csvSR(s.runs,s.balls)
  }));

  // Foot analysis
  const footRows = ["Front Foot","Back Foot","No Movement"].map(fn=>{
    const fr = rows.filter(r=>r.fn===fn);
    const fb = csvBalls(fr).length;
    const frun= csvRuns(fr);
    return {foot:fn, runs:frun, balls:fb, sr:csvSR(frun,fb),
      fours:fr.filter(r=>parseInt(r.br)===4).length,
      sixes:fr.filter(r=>parseInt(r.br)===6).length};
  });

  return {
    player:batName.trim(), team, style, dismissal,
    mode:modeFilter||"ALL",
    runs, balls:bCount, sr:csvSR(runs,bCount),
    avg:csvAvg(runs, Math.max(wkts,1)),
    fours, sixes, dots, dot_pct:csvDotPct(rows),
    phaseRows, psRows, actionRows, top2, top3unorthodox, footRows
  };
}

/* ─────────────────────────────────────
   OPEN / CLOSE PLAYER CARD MODAL
───────────────────────────────────── */
function openPcModal(playerName, mode){
  mode = mode || "ALL";
  const stats = computeBatterStats(playerName, mode);
  if(!stats){ alert("No batting data found for: "+playerName); return; }
  document.getElementById("pcWrap").innerHTML = buildLandscapeCard(stats, mode);
  document.getElementById("pcOverlay").classList.add("open");
  document.getElementById("pcOverlay").scrollTop = 0;
}
function closePcModal(){
  document.getElementById("pcOverlay").classList.remove("open");
}

/* ─────────────────────────────────────
   BUILD LANDSCAPE CARD HTML
───────────────────────────────────── */
function buildLandscapeCard(s, mode){
  const modeLabel = mode==="PACE" ? "Against Pace" : mode==="SPIN" ? "Against Spin" : "All Deliveries";
  const safePlayer = s.player.replace(/'/g,"\\'");

  const strengthHtml = s.top2.length
    ? s.top2.map((sh,i)=>`
        <div class="pc-strength">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;">
            <div class="pc-shot-name">${i+1}. ${esc(sh.shot)}</div>
            <div class="pc-tag">Strength</div>
          </div>
          <div class="pc-evidence">${esc(sh.evidence)}</div>
        </div>`).join("")
    : `<div style="color:#475569;font-size:12px;">No shot evidence found.</div>`;

  const unorthodoxHtml = s.top3unorthodox.length
    ? s.top3unorthodox.map(sh=>`<li>${esc(sh.shot)} &mdash; ${sh.runs} runs, ${sh.balls} balls, SR ${fmt(sh.sr)}</li>`).join("")
    : `<li>No unorthodox shot data.</li>`;

  const matchupRows = s.actionRows.map(r=>`
      <tr><td>${esc(r.action)}</td><td>${r.runs}</td><td>${r.balls}</td>
      <td>${r.wkts}</td><td>${fmt(r.sr)}</td><td>${r.balls>0?fmt(r.runs/Math.max(r.wkts,1)):"-"}</td></tr>`
  ).join("");

  const phaseTableRows = s.phaseRows.map(p=>`
      <tr><td>${p.phase}</td><td>${p.runs}</td><td>${p.balls}</td>
      <td>${p.fours}</td><td>${p.sixes}</td><td>${fmt(p.sr)}</td><td>${fmt(p.dot_pct)}</td></tr>`
  ).join("");

  const psTableRows = s.psRows.map(p=>`
      <tr><td>${p.type}</td><td>${p.runs}</td><td>${p.balls}</td>
      <td>${p.fours}</td><td>${p.sixes}</td><td>${fmt(p.sr)}</td><td>${p.wkts}</td></tr>`
  ).join("");

  const footTableRows = s.footRows.map(f=>`
      <tr><td>${f.foot}</td><td>${f.runs}</td><td>${f.balls}</td>
      <td>${fmt(f.sr)}</td><td>${f.fours}</td><td>${f.sixes}</td></tr>`
  ).join("");

  return `
    <div class="pc-ctrl-bar">
      <label>Mode:</label>
      <button class="pc-mode-btn${mode==="ALL"?" active":""}" onclick="openPcModal('${safePlayer}','ALL')">All</button>
      <button class="pc-mode-btn${mode==="PACE"?" active":""}" onclick="openPcModal('${safePlayer}','PACE')">vs Pace</button>
      <button class="pc-mode-btn${mode==="SPIN"?" active":""}" onclick="openPcModal('${safePlayer}','SPIN')">vs Spin</button>
      <div style="flex:1"></div>
      <button class="pc-mode-btn" onclick="window.print()">&#128438; Export PDF</button>
    </div>

    <div class="pc-head">
      <div class="pc-title">
        <h2>${esc(s.player)}</h2>
        <div class="pc-sub">${esc(s.team)} &bull; ${esc(s.style||"Player")} &bull; ${esc(modeLabel)}</div>
      </div>
      <div class="pc-meta-boxes">
        <div class="pc-meta-box"><div class="k">Team</div><div class="v" style="font-size:13px;">${esc(s.team)}</div></div>
        <div class="pc-meta-box"><div class="k">Style</div><div class="v">${esc(s.style||"-")}</div></div>
        <div class="pc-meta-box"><div class="k">Mode</div><div class="v">${esc(mode)}</div></div>
      </div>
    </div>

    <div class="pc-body">

      <div class="pc-col">
        <div class="pc-block">
          <h3>Performance Summary</h3>
          <div class="inner">
            <div class="pc-stat-grid">
              <div class="pc-stat"><div class="s1">Runs</div><div class="s2">${s.runs}</div></div>
              <div class="pc-stat"><div class="s1">Balls</div><div class="s2">${s.balls}</div></div>
              <div class="pc-stat"><div class="s1">Strike Rate</div><div class="s2">${fmt(s.sr)}</div></div>
              <div class="pc-stat"><div class="s1">Average</div><div class="s2">${fmt(s.avg)}</div></div>
            </div>
          </div>
        </div>

        <div class="pc-block">
          <h3>Additional KPIs</h3>
          <div class="inner">
            <div class="pc-kpis">
              <div class="pc-mini"><div class="k">4s</div><div class="v">${s.fours}</div></div>
              <div class="pc-mini"><div class="k">6s</div><div class="v">${s.sixes}</div></div>
              <div class="pc-mini"><div class="k">Dots</div><div class="v">${s.dots}</div></div>
              <div class="pc-mini"><div class="k">Dot %</div><div class="v">${fmt(s.dot_pct)}</div></div>
            </div>
          </div>
        </div>

        <div class="pc-block">
          <h3>Phase Breakdown</h3>
          <div class="inner">
            <table class="pc-table">
              <thead><tr><th>Phase</th><th>R</th><th>B</th><th>4s</th><th>6s</th><th>SR</th><th>Dot%</th></tr></thead>
              <tbody>${phaseTableRows}</tbody>
            </table>
          </div>
        </div>

        <div class="pc-block">
          <h3>Analyst Notes</h3>
          <div class="inner">
            <div class="pc-notes" contenteditable="true">Write custom analyst notes here before exporting the player card to PDF.</div>
          </div>
        </div>
      </div>

      <div class="pc-col">
        <div class="pc-block">
          <h3>Top 2 Strength Shots</h3>
          <div class="inner">${strengthHtml}</div>
        </div>

        <div class="pc-block">
          <h3>Top 3 Unorthodox Shots</h3>
          <div class="inner"><ul class="pc-ulist">${unorthodoxHtml}</ul></div>
        </div>

        <div class="pc-block">
          <h3>Pace vs Spin Breakdown</h3>
          <div class="inner">
            <table class="pc-table">
              <thead><tr><th>Type</th><th>R</th><th>B</th><th>4s</th><th>6s</th><th>SR</th><th>W</th></tr></thead>
              <tbody>${psTableRows}</tbody>
            </table>
          </div>
        </div>

        <div class="pc-block">
          <h3>Matchups by Bowling Action</h3>
          <div class="inner">
            <table class="pc-table">
              <thead><tr><th>Action</th><th>Runs</th><th>Balls</th><th>W</th><th>SR</th><th>Avg</th></tr></thead>
              <tbody>${matchupRows}</tbody>
            </table>
          </div>
        </div>
      </div>

      <div class="pc-col">
        <div class="pc-block">
          <h3>Visual Analysis Panels</h3>
          <div class="inner">
            <div class="pc-img-grid">
              <div class="pc-img-card"><div class="pc-img-label">Wagon Zone</div>Upload wagon zone image</div>
              <div class="pc-img-card"><div class="pc-img-label">Pitch Map</div>Upload pitch map image</div>
              <div class="pc-img-card"><div class="pc-img-label">SR Grid</div>Upload SR grid image</div>
              <div class="pc-img-card"><div class="pc-img-label">Dismissal Line</div>Upload dismissal line image</div>
            </div>
          </div>
        </div>

        <div class="pc-block">
          <h3>Foot Position Analysis</h3>
          <div class="inner">
            <table class="pc-table">
              <thead><tr><th>Foot</th><th>R</th><th>B</th><th>SR</th><th>4s</th><th>6s</th></tr></thead>
              <tbody>${footTableRows}</tbody>
            </table>
          </div>
        </div>

        <div class="pc-block">
          <h3>Presentation Footer</h3>
          <div class="inner">
            <div class="pc-notes" contenteditable="true">Evidence-based player card generated from ball-by-ball dataset. Edit this text for presentation context before export.</div>
          </div>
        </div>
      </div>

    </div>

    <div class="pc-footer">
      <div>Talking Bat Analytics</div>
      <div>Dismissal: ${esc(s.dismissal||"not out")} &bull; ${esc(MATCH_META.team1)} vs ${esc(MATCH_META.team2)} &bull; ${esc(MATCH_META.date)}</div>
      <div>Landscape Card &bull; A4 / PPT Ready</div>
    </div>`;
}

/* ─────────────────────────────────────
   PLAYER SCORECARD TAB
───────────────────────────────────── */
function renderPlayerCardTab(){
  const inn1 = [...new Set(CSV_DATA.filter(r=>r.in===1).map(r=>r.bat.trim()))];
  const inn2 = [...new Set(CSV_DATA.filter(r=>r.in===2).map(r=>r.bat.trim()))];
  const allBatsmen = [...new Set(CSV_DATA.map(r=>r.bat.trim()))].sort();

  function batsmanSummary(players, inns){
    return players.map(p=>{
      const rows = CSV_DATA.filter(r=>r.bat.trim()===p && r.in===inns);
      const balls = csvBalls(rows).length;
      const runs  = csvRuns(rows);
      const fours = rows.filter(r=>parseInt(r.br)===4).length;
      const sixes = rows.filter(r=>parseInt(r.br)===6).length;
      const dismissRow = CSV_DATA.find(r=>r.pd && r.pd.trim()===p);
      const dk = dismissRow ? dismissRow.dk : "not out";
      const sp = p.replace(/'/g,"\\'");
      return `<tr>
        <td style="text-align:left;font-weight:800;color:#dce7ff;">${esc(p)}</td>
        <td>${esc(dk)}</td><td>${runs}</td><td>${balls}</td><td>${fours}</td><td>${sixes}</td>
        <td>${fmt(csvSR(runs,balls))}</td>
        <td>
          <button class="btn-card-view" onclick="openPcModal('${sp}','ALL')">All</button>
          <button class="btn-card-view" onclick="openPcModal('${sp}','PACE')">Pace</button>
          <button class="btn-card-view" onclick="openPcModal('${sp}','SPIN')">Spin</button>
        </td>
      </tr>`;
    }).join("");
  }

  document.getElementById("playercardtab").innerHTML = `
    <div class="card">
      <div class="section-title">&#9654; Player Scorecard &mdash; Select &amp; View Card</div>
      <div class="section-sub">
        Click <strong>All</strong>, <strong>Pace</strong> or <strong>Spin</strong> next to any batter to open their full landscape player card.
        Data sourced live from <strong>talkingbat.csv</strong> &mdash;
        Match ${MATCH_META.match_id}: ${esc(MATCH_META.team1)} vs ${esc(MATCH_META.team2)},
        ${esc(MATCH_META.venue)}, ${esc(MATCH_META.date)}.
      </div>
    </div>

    <div class="card">
      <div class="section-title">${esc(MATCH_META.team1)} &mdash; Innings 1 (${esc(MATCH_META.score1)})</div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>Batter</th><th>Dismissal</th><th>R</th><th>B</th><th>4s</th><th>6s</th><th>SR</th><th>Player Card</th></tr></thead>
          <tbody>${batsmanSummary(inn1,1)}</tbody>
        </table>
      </div>
    </div>

    <div class="card">
      <div class="section-title">${esc(MATCH_META.team2)} &mdash; Innings 2 (${esc(MATCH_META.score2)})</div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>Batter</th><th>Dismissal</th><th>R</th><th>B</th><th>4s</th><th>6s</th><th>SR</th><th>Player Card</th></tr></thead>
          <tbody>${batsmanSummary(inn2,2)}</tbody>
        </table>
      </div>
    </div>

    <div class="card">
      <div class="section-title">Quick Player Lookup</div>
      <div class="section-sub">Select any player from the dataset and open their card instantly.</div>
      <div style="display:flex;gap:12px;flex-wrap:wrap;align-items:center;margin-top:8px;">
        <select id="pcPlayerSel" class="select" style="max-width:260px;">
          ${allBatsmen.map(b=>`<option value="${esc(b)}">${esc(b)}</option>`).join("")}
        </select>
        <select id="pcModeSel" class="select" style="max-width:160px;">
          <option value="ALL">All Deliveries</option>
          <option value="PACE">vs Pace</option>
          <option value="SPIN">vs Spin</option>
        </select>
        <button onclick="openPcModal(document.getElementById('pcPlayerSel').value, document.getElementById('pcModeSel').value)">Open Player Card</button>
      </div>
    </div>`;
}


fillFilters();
renderSelected();
renderPlayerCardTab();
</script>
